visual_landing_node:
  ros__parameters:
    target_observation_topic: /uav/visual_landing/target_observation
    state_topic: /uav/state/odometry
    velocity_body_topic: /uav/control/setpoint/velocity_body
    controller_state_topic: /uav/visual_landing/controller_state
    hold_service: /uav/control/command/hold
    land_service: /uav/control/command/land
    height_measurement_transport: stamped_range
    height_measurement_topic: /uav/sensors/downward_range
    height_measurement_mode: ""  # legacy
    range_topic: /uav/fmu/out/distance_sensor  # legacy
    vehicle_local_position_topic: /uav/fmu/out/vehicle_local_position
    start_service: /uav/visual_landing/command/start
    stop_service: /uav/visual_landing/command/stop

    kp_xy_m: 0.80
    kd_xy_m: 0.15
    xy_error_alpha: 0.50
    xy_error_rate_alpha: 0.35
    xy_error_rate_limit: 2.0
    xy_error_rate_dt_min_s: 0.005
    xy_error_rate_dt_max_s: 0.20

    kp_yaw: 1.20
    max_vyaw: 0.60
    vel_damping_yaw: 0.18
    yaw_deadband_rad: 0.03

    align_enter_lateral_m: 0.08
    align_exit_lateral_m: 0.05
    align_enter_yaw_rad: 0.08
    align_exit_yaw_rad: 0.06
    max_vxy: 0.40

    hold_verify_s: 0.5
    search_height_m: 1.0
    search_height_tolerance_m: 0.10
    descend_speed: 0.12
    terminal_entry_height_m: 0.40

    z_hold_kp: 1.20
    z_hold_max_vz: 0.18
    z_descend_kp: 1.30
    z_descend_max_vz: 0.25
    z_terminal_kp: 1.10
    z_terminal_max_vz: 0.12
    vel_damping_z: 0.18

    observation_timeout_s: 0.30
    observation_miss_frames: 3
    state_timeout_s: 0.20
    terminal_entry_consecutive_samples: 2
    target_memory_timeout_s: 0.5
    range_timeout_s: 0.15
    range_min_m: 0.05
    range_max_m: 5.0
    range_consistency_max_diff_m: 0.35

    control_rate_hz: 50.0
    status_rate_hz: 5.0
