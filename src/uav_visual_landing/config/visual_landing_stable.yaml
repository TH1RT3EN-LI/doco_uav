visual_landing_node:
  ros__parameters:
    target_observation_topic: /uav/visual_landing/target_observation
    state_topic: /uav/state/odometry
    velocity_body_topic: /uav/control/setpoint/velocity_body
    controller_state_topic: /uav/visual_landing/controller_state
    hold_service: /uav/control/command/hold
    land_service: /uav/control/command/land
    range_topic: /uav/fmu/in/distance_sensor
    start_service: /uav/visual_landing/command/start
    stop_service: /uav/visual_landing/command/stop

    kp_xy: 0.42
    kp_yaw: 1.20
    max_vxy: 0.40
    max_vyaw: 0.60
    vel_damping_xy: 0.25
    vel_damping_yaw: 0.18
    yaw_deadband_rad: 0.03
    min_height_for_xy: 0.35

    align_enter_error: 0.030
    align_exit_error: 0.022
    align_enter_yaw: 0.12
    align_exit_yaw: 0.09
    hold_verify_s: 0.5

    descend_speed: 0.12
    terminal_descend_speed: 0.06
    terminal_entry_height_m: 0.60
    land_height_m: 0.12

    z_hold_kp: 1.20
    z_hold_max_vz: 0.18
    z_descend_kp: 1.30
    z_descend_max_vz: 0.25
    z_terminal_kp: 1.10
    z_terminal_max_vz: 0.12
    vel_damping_z: 0.18

    max_acc_xy: 0.80
    max_acc_z: 0.50
    max_acc_yaw: 1.20

    observation_timeout_s: 0.30
    range_timeout_s: 0.15
    range_min_m: 0.05
    range_max_m: 5.0
    range_consistency_max_diff_m: 0.35

    control_rate_hz: 30.0
    status_rate_hz: 5.0
