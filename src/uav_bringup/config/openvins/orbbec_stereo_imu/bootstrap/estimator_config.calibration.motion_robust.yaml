%YAML:1.0

verbosity: "INFO"

use_fej: true
integration: "rk4"
use_stereo: true
max_cameras: 2

calib_cam_extrinsics: true
calib_cam_intrinsics: false
calib_cam_timeoffset: true
calib_imu_intrinsics: false
calib_imu_g_sensitivity: false

max_clones: 11
max_slam: 50
max_slam_in_update: 25
max_msckf_in_update: 40
dt_slam_delay: 1

gravity_mag: 9.81

feat_rep_msckf: "GLOBAL_3D"
feat_rep_slam: "ANCHORED_MSCKF_INVERSE_DEPTH"
feat_rep_aruco: "ANCHORED_MSCKF_INVERSE_DEPTH"

try_zupt: true
zupt_chi2_multipler: 0
zupt_max_velocity: 0.1
zupt_noise_multiplier: 10
zupt_max_disparity: 0.5
zupt_only_at_beginning: true

init_window_time: 2.0
init_imu_thresh: 1.5
init_max_disparity: 15.0
init_max_features: 80

init_dyn_use: false
init_dyn_mle_opt_calib: false
init_dyn_mle_max_iter: 50
init_dyn_mle_max_time: 0.05
init_dyn_mle_max_threads: 4
init_dyn_num_pose: 6
init_dyn_min_deg: 10.0

init_dyn_inflation_ori: 10
init_dyn_inflation_vel: 100
init_dyn_inflation_bg: 10
init_dyn_inflation_ba: 100
init_dyn_min_rec_cond: 1e-12

init_dyn_bias_g: [0.0, 0.0, 0.0]
init_dyn_bias_a: [0.0, 0.0, 0.0]

record_timing_information: false
record_timing_filepath: "/tmp/traj_timing.txt"

save_total_state: false
filepath_est: "/tmp/ov_estimate.txt"
filepath_std: "/tmp/ov_estimate_std.txt"
filepath_gt: "/tmp/ov_groundtruth.txt"

use_klt: true
num_pts: 220
fast_threshold: 18
grid_x: 5
grid_y: 5
min_px_dist: 15
klt_pyr_levels: 6
klt_win_size: 21
klt_enable_prediction: true
klt_enable_pixel_velocity_prediction: true
klt_pixel_velocity_clamp_px: 40
klt_fb_check: true
klt_fb_thresh_px: 0.5
klt_reset_consecutive_bad_frames: 3
klt_retry_without_prediction: true
klt_large_window_rescue: true
klt_large_window_size: 31
klt_large_window_levels: 7
klt_rescue_min_track_age: 4
klt_rescue_max_candidates: 60
track_priority_mode: "age"
knn_ratio: 0.70
track_frequency: 30
track_frequency_slack: 0.10
estimator_camera_update_stride: 1
estimator_adaptive_update_stride: false
downsample_cameras: false
num_opencv_threads: 4
histogram_method: "CLAHE"

use_aruco: false
num_aruco: 1024
downsize_aruco: true

up_msckf_sigma_px: 1
up_msckf_chi2_multipler: 1
up_slam_sigma_px: 1
up_slam_chi2_multipler: 1
up_aruco_sigma_px: 1
up_aruco_chi2_multipler: 1

use_mask: true
mask0: "mask0.pgm"
mask1: "mask1.pgm"

relative_config_imu: "kalibr_imu_chain.yaml"
relative_config_imucam: "kalibr_imucam_chain.yaml"
